name: Build Unsigned Godot iOS IPA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# ──────────────────────────────────────────────
# CONFIG  — edit these to match your setup
# ──────────────────────────────────────────────
env:
  GODOT_VERSION: "4.3"                     # Godot version to download
  GODOT_EXPORT_PRESET: "iOS"              # Must match preset name in export_presets.cfg
  PROJECT_NAME: "GodotSwiftApp"           # Used for output file names
  BUNDLE_ID: "com.example.godotswiftapp"  # iOS Bundle Identifier
  DISPLAY_NAME: "Godot Swift App"         # App display name

jobs:
  build-unsigned-ipa:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:

      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Create the full Godot project in-place ────────────────────────────
      #       (All source files are generated here so you need ZERO local code)
      - name: Generate Godot project source files
        run: |
          set -e
          mkdir -p GodotProject/.godot
          mkdir -p GodotProject/scenes
          mkdir -p GodotProject/scripts
          mkdir -p GodotProject/ios/icons

          # ── project.godot ────────────────────────────────────────────────────
          cat > GodotProject/project.godot << 'GODOT_PROJECT'
          ; Engine configuration file.
          ; Generated by Godot 4 build workflow

          config_version=5

          [application]
          config/name="Godot Swift App"
          config/description="A beautiful Godot 4 app built with GitHub Actions"
          run/main_scene="res://scenes/Main.tscn"
          config/features=PackedStringArray("4.3", "Mobile")
          config/icon="res://ios/icons/icon.png"

          [display]
          window/size/viewport_width=390
          window/size/viewport_height=844
          window/handheld/orientation=0
          window/stretch/mode="canvas_items"
          window/stretch/aspect="expand"

          [rendering]
          renderer/rendering_method="mobile"
          GODOT_PROJECT

          # ── Main scene (Main.tscn) ───────────────────────────────────────────
          cat > GodotProject/scenes/Main.tscn << 'MAIN_TSCN'
          [gd_scene load_steps=3 format=3 uid="uid://main"]

          [ext_resource type="Script" path="res://scripts/Main.gd" id="1"]
          [ext_resource type="Script" path="res://scripts/Counter.gd" id="2"]

          [node name="Main" type="Control"]
          layout_mode = 3
          anchors_preset = 15
          anchor_right = 1.0
          anchor_bottom = 1.0
          script = ExtResource("1")

          [node name="Background" type="ColorRect" parent="."]
          layout_mode = 1
          anchors_preset = 15
          anchor_right = 1.0
          anchor_bottom = 1.0
          color = Color(0.07, 0.07, 0.12, 1)

          [node name="VBox" type="VBoxContainer" parent="."]
          layout_mode = 1
          anchors_preset = 8
          anchor_left = 0.5
          anchor_top = 0.5
          anchor_right = 0.5
          anchor_bottom = 0.5
          offset_left = -160.0
          offset_top = -220.0
          offset_right = 160.0
          offset_bottom = 220.0
          theme_override_constants/separation = 24

          [node name="AppIcon" type="Label" parent="VBox"]
          text = "⚡"
          theme_override_font_sizes/font_size = 72
          horizontal_alignment = 1

          [node name="Title" type="Label" parent="VBox"]
          text = "Godot Swift App"
          theme_override_font_sizes/font_size = 28
          theme_override_colors/font_color = Color(1, 1, 1, 1)
          horizontal_alignment = 1

          [node name="Subtitle" type="Label" parent="VBox"]
          text = "Built with Godot 4 + GitHub Actions"
          theme_override_font_sizes/font_size = 14
          theme_override_colors/font_color = Color(0.6, 0.6, 0.8, 1)
          horizontal_alignment = 1
          autowrap_mode = 3

          [node name="Spacer1" type="Control" parent="VBox"]
          custom_minimum_size = Vector2(0, 20)

          [node name="CounterLabel" type="Label" parent="VBox"]
          name = "CounterLabel"
          text = "Taps: 0"
          theme_override_font_sizes/font_size = 22
          theme_override_colors/font_color = Color(0.4, 0.8, 1.0, 1)
          horizontal_alignment = 1

          [node name="TapButton" type="Button" parent="VBox"]
          custom_minimum_size = Vector2(280, 60)
          text = "Tap Me!"
          theme_override_font_sizes/font_size = 20
          script = ExtResource("2")
          MAIN_TSCN

          # ── Main.gd ─────────────────────────────────────────────────────────
          cat > GodotProject/scripts/Main.gd << 'MAIN_GD'
          extends Control

          @onready var counter_label: Label = $VBox/CounterLabel
          @onready var tap_button: Button = $VBox/TapButton
          @onready var background: ColorRect = $Background

          var tap_count: int = 0
          var hue: float = 0.6

          func _ready() -> void:
              tap_button.pressed.connect(_on_tap_button_pressed)
              _apply_button_style()

          func _on_tap_button_pressed() -> void:
              tap_count += 1
              counter_label.text = "Taps: %d" % tap_count
              _cycle_color()
              _bounce_button()

          func _cycle_color() -> void:
              hue = fmod(hue + 0.07, 1.0)
              var accent = Color.from_hsv(hue, 0.7, 1.0)
              counter_label.add_theme_color_override("font_color", accent)

          func _bounce_button() -> void:
              var tween = create_tween()
              tween.tween_property(tap_button, "scale", Vector2(0.92, 0.92), 0.08)
              tween.tween_property(tap_button, "scale", Vector2(1.0, 1.0), 0.12)

          func _apply_button_style() -> void:
              var style = StyleBoxFlat.new()
              style.bg_color = Color(0.2, 0.5, 0.9, 1.0)
              style.corner_radius_top_left = 16
              style.corner_radius_top_right = 16
              style.corner_radius_bottom_left = 16
              style.corner_radius_bottom_right = 16
              tap_button.add_theme_stylebox_override("normal", style)
              tap_button.add_theme_color_override("font_color", Color.WHITE)
          MAIN_GD

          # ── Counter.gd ──────────────────────────────────────────────────────
          cat > GodotProject/scripts/Counter.gd << 'COUNTER_GD'
          extends Button
          # Attached to TapButton — placeholder for future extensions
          COUNTER_GD

          echo "✅ Godot project source files created"

      # ── 3. Generate export_presets.cfg ───────────────────────────────────────
      - name: Generate export_presets.cfg
        run: |
          cat > GodotProject/export_presets.cfg << PRESETS
          [preset.0]

          name="iOS"
          platform="iOS"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="../${{ env.PROJECT_NAME }}.ipa"
          encryption_include_filters=""
          encryption_exclude_filters=""
          encrypt_pck=false
          encrypt_directory=false

          [preset.0.options]

          custom_template/debug=""
          custom_template/release=""
          application/bundle_identifier="${{ env.BUNDLE_ID }}"
          application/signature=""
          application/short_version="1.0"
          application/version="1"
          application/icon=""
          application/launch_screens_path=""
          application/export_method=0
          architectures/arm64=true
          capabilities/access_wifi=false
          capabilities/push_notifications=false
          user_data/accessible_from_files_app=false
          user_data/accessible_from_itunes_sharing=false
          privacy/microphone_usage_description=""
          privacy/camera_usage_description=""
          privacy/location_usage_description=""
          privacy/photo_library_usage_description=""
          icons/iphone_120x120=""
          icons/iphone_180x180=""
          icons/ipad_76x76=""
          icons/ipad_152x152=""
          icons/ipad_167x167=""
          icons/app_store_1024x1024=""
          icons/spotlight_40x40=""
          icons/spotlight_80x80=""
          PRESETS
          echo "✅ export_presets.cfg created"

      # ── 4. Generate a placeholder app icon (PNG via Python) ──────────────────
      - name: Generate placeholder app icon
        run: |
          python3 - << 'PYEOF'
          import struct, zlib, os

          def make_png(w, h, color):
              def chunk(name, data):
                  c = zlib.crc32(name + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)
              r, g, b = color
              raw = b''
              for _ in range(h):
                  row = b'\x00' + bytes([r, g, b] * w)
                  raw += row
              compressed = zlib.compress(raw)
              png = b'\x89PNG\r\n\x1a\n'
              png += chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0))
              png += chunk(b'IDAT', compressed)
              png += chunk(b'IEND', b'')
              return png

          os.makedirs('GodotProject/ios/icons', exist_ok=True)
          with open('GodotProject/ios/icons/icon.png', 'wb') as f:
              f.write(make_png(1024, 1024, (30, 100, 200)))
          print('✅ App icon generated')
          PYEOF

      # ── 5. Install Godot 4 + iOS export templates ────────────────────────────
      - name: Install Godot ${{ env.GODOT_VERSION }} headless
        run: |
          GODOT_VER="${{ env.GODOT_VERSION }}"
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VER}-stable"

          echo "⬇️  Downloading Godot macOS editor..."
          curl -fsSL "${BASE}/Godot_v${GODOT_VER}-stable_macos.universal.zip" \
               -o godot_macos.zip

          unzip -q godot_macos.zip -d godot_editor
          GODOT_BIN="$(find godot_editor -name 'Godot' -type f | head -1)"
          chmod +x "$GODOT_BIN"
          echo "GODOT=$GODOT_BIN" >> "$GITHUB_ENV"
          echo "✅ Godot binary: $GODOT_BIN"

      - name: Install iOS export templates
        run: |
          GODOT_VER="${{ env.GODOT_VERSION }}"
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VER}-stable"
          TPL_FILE="Godot_v${GODOT_VER}-stable_export_templates.tpz"

          echo "⬇️  Downloading export templates (this may take a while)..."
          curl -fsSL "${BASE}/${TPL_FILE}" -o export_templates.tpz

          TEMPLATE_DIR="$HOME/Library/Application Support/Godot/export_templates/${GODOT_VER}.stable"
          mkdir -p "$TEMPLATE_DIR"

          echo "📦 Extracting templates..."
          unzip -q export_templates.tpz -d tpl_extract
          cp -r tpl_extract/templates/* "$TEMPLATE_DIR/"
          echo "✅ Templates installed to $TEMPLATE_DIR"

      # ── 6. Export the Godot project ──────────────────────────────────────────
      - name: Export Godot project (iOS)
        run: |
          cd GodotProject
          echo "🚀 Running Godot headless export..."
          "$GODOT" \
            --headless \
            --export-release "iOS" \
            "../${{ env.PROJECT_NAME }}.ipa" \
            2>&1 | tee ../godot_export.log || true

          echo "--- Export Log ---"
          cat ../godot_export.log

      # ── 7. Find / verify the IPA (Godot may output .xcarchive instead) ───────
      - name: Locate and finalize IPA
        run: |
          echo "📂 Searching for build output..."
          find . -name "*.ipa" -o -name "*.xcarchive" -o -name "*.app" 2>/dev/null | head -20

          # Godot 4 iOS export produces an Xcode project; we build the IPA here
          XCODE_PROJ=$(find . -name "*.xcodeproj" | head -1)
          if [ -n "$XCODE_PROJ" ]; then
            PROJ_DIR=$(dirname "$XCODE_PROJ")
            echo "Found Xcode project: $XCODE_PROJ"

            xcodebuild \
              -project "$XCODE_PROJ" \
              -scheme "${{ env.PROJECT_NAME }}" \
              -configuration Release \
              -sdk iphoneos \
              -archivePath "${{ env.PROJECT_NAME }}.xcarchive" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_ALLOWED=NO \
              archive \
              2>&1 | tail -40

            # Package the .app as an unsigned IPA
            APP_PATH=$(find "${{ env.PROJECT_NAME }}.xcarchive" -name "*.app" | head -1)
            if [ -n "$APP_PATH" ]; then
              mkdir -p Payload
              cp -r "$APP_PATH" Payload/
              zip -qr "${{ env.PROJECT_NAME }}_unsigned.ipa" Payload/
              rm -rf Payload
              echo "✅ IPA created: ${{ env.PROJECT_NAME }}_unsigned.ipa"
            fi
          fi

          # Rename any .ipa Godot already made
          if [ -f "${{ env.PROJECT_NAME }}.ipa" ]; then
            mv "${{ env.PROJECT_NAME }}.ipa" "${{ env.PROJECT_NAME }}_unsigned.ipa"
            echo "✅ Renamed to ${{ env.PROJECT_NAME }}_unsigned.ipa"
          fi

      # ── 8. Upload IPA as artifact ────────────────────────────────────────────
      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-unsigned-ipa
          path: |
            ${{ env.PROJECT_NAME }}_unsigned.ipa
            godot_export.log
          if-no-files-found: warn
          retention-days: 30

      # ── 9. (Optional) Create a GitHub Release on tag push ───────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PROJECT_NAME }}_unsigned.ipa
          name: "Unsigned IPA — ${{ github.ref_name }}"
          body: |
            ## ${{ env.DISPLAY_NAME }} — Unsigned IPA

            Built with **Godot ${{ env.GODOT_VERSION }}** via GitHub Actions.

            ### Install (sideload)
            | Tool | Command |
            |------|---------|
            | **AltStore** | Open AltStore → ＋ → select this IPA |
            | **Sideloadly** | Drag IPA into Sideloadly |
            | **iOS App Installer** | Use TrollStore or similar |

            > ⚠️  Unsigned — requires sideloading. Not for App Store distribution.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
