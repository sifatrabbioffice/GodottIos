name: 📱 Build Godot iOS Editor (Unsigned IPA)

on:
  workflow_dispatch: # গিটহাব থেকে ম্যানুয়ালি রান করার জন্য

jobs:
  build-ios-editor:
    runs-on: macos-15 # লেটেস্ট ম্যাক ওএস রানার

    steps:
    # ১. পাইথন এবং বিল্ড এনভায়রনমেন্ট সেটআপ
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # ২. গডোটের আসল বিল্ড টুল SCons ইনস্টল
    - name: Install SCons
      run: |
        python -m pip install scons

    # ৩. গডোটের অফিশিয়াল ফুল সোর্স কোড ডাউনলোড (Latest Master)
    - name: Clone Official Godot Source Code
      run: |
        git clone --depth 1 https://github.com/godotengine/godot.git
        cd godot
        git submodule update --init --recursive

    # ৪. আইফোন ডিভাইসের জন্য গডোটের ফুল এডিটর (tools=yes) কমপাইল করা
    - name: Compile Godot Editor for iOS (ARM64)
      run: |
        cd godot
        scons platform=ios target=editor arch=arm64 tools=yes -j$(sysctl -n hw.logicalcpu)

    # 🗜️ ৫. আনসাইনড (Unsigned) অ্যাপ স্ট্রাকচার ও .ipa তৈরি করা
    - name: Package into Unsigned .ipa
      run: |
        cd godot
        
        # আইওএস অ্যাপের মূল ফোল্ডার তৈরি
        mkdir -p Payload/GodotEditor.app
        
        # ওয়াইল্ডকার্ড ব্যবহার করে কমপাইল হওয়া মূল বাইনারি ফাইলটি 'GodotEditor' নামে কপি করা
        # এর ফলে নামের শেষে অন্য কিছু থাকলেও কোনো এরর আসবে না
        cp bin/godot.ios.editor* Payload/GodotEditor.app/GodotEditor
        
        # যদি কোনো অতিরিক্ত আইওএস প্ল্যাটফর্ম রিসোর্স বা ডাটা ফোল্ডার থাকে তা কপি করা
        if [ -d "platform/ios/assets" ]; then
          cp -r platform/ios/assets/* Payload/GodotEditor.app/
        fi

        # সঠিক এবং সম্পূর্ণ Info.plist তৈরি করা যা আইফোনে অ্যাপটি চালু করতে সাহায্য করবে
        cat <<EOF > Payload/GodotEditor.app/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.9.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>GodotEditor</string>
            <key>CFBundleIdentifier</key>
            <string>org.godotengine.editor.ios</string>
            <key>CFBundleName</key>
            <string>GodotEditor</string>
            <key>CFBundleDisplayName</key>
            <string>Godot Editor</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>4.x</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>MinimumOSVersion</key>
            <string>15.0</string>
            <key>UIDeviceFamily</key>
            <array>
                <integer>1</integer>
                <integer>2</integer>
            </array>
            <key>UIRequiredDeviceCapabilities</key>
            <array>
                <string>arm64</string>
            </array>
        </dict>
        </plist>
        EOF
        
        # সবকিছুকে একটি ফাইনাল .ipa ফাইলে জিপ করা
        zip -r Godot_iOS_Editor_Unsigned.ipa Payload/

    # 📤 ৬. ফাইনাল আনসাইনড .ipa ফাইলটি গিটহাবে আপলোড করা
    - name: Upload Final Unsigned IPA
      uses: actions/upload-artifact@v4
      with:
        name: Godot-iOS-Editor-Unsigned-IPA
        path: godot/Godot_iOS_Editor_Unsigned.ipa
