name: 📱 Build Godot iOS Editor (Unsigned IPA)

on:
  workflow_dispatch: # গিটহাব থেকে ম্যানুয়ালি রান করার জন্য
  push:

jobs:
  build-ios-editor:
    runs-on: macos-14 # অ্যাপলের লেটেস্ট কমান্ড লাইন টুলস ব্যবহারের জন্য

    steps:
    # ১. পাইথন এবং বিল্ড এনভায়রনমেন্ট সেটআপ
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # ২. Xcode 16.0 সেটআপ করা (যাতে Clang 16 এররটি আর না আসে)
    - name: Select Xcode Version 16.0
      run: |
        sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer
        xcodebuild -version

    # ৩. গডোটের আসল বিল্ডツール SCons ইনস্টল
    - name: Install SCons
      run: |
        python -m pip install scons

    # ৪. গডোটের অফিশিয়াল ফুল সোর্স কোড ডাউনলোড (Latest Master)
    - name: Clone Official Godot Source Code
      run: |
        git clone --depth 1 https://github.com/godotengine/godot.git
        cd godot
        git submodule update --init --recursive

    # ৫. আইফোন ডিভাইসের জন্য গডোটের ফুল এডিটর (tools=yes) কমপাইল করা
    - name: Compile Godot Editor for iOS (ARM64)
      run: |
        cd godot
        scons platform=ios target=editor arch=arm64 tools=yes -j$(sysctl -n hw.logicalcpu)

    # 🗜️ ৬. আনসাইনড (Unsigned) অ্যাপ স্ট্রাকচার ও .ipa তৈরি করা
    - name: Package into Unsigned .ipa
      run: |
        cd godot
        mkdir -p Payload/GodotEditor.app
        cp bin/godot.ios.editor.arm64 Payload/GodotEditor.app/GodotEditor
        
        cat <<EOF > Payload/GodotEditor.app/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.9.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>GodotEditor</string>
            <key>CFBundleIdentifier</key>
            <string>org.godotengine.editor.ios</string>
            <key>CFBundleName</key>
            <string>GodotEditor</string>
            <key>CFBundleShortVersionString</key>
            <string>4.x</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>MinimumOSVersion</key>
            <string>15.0</string>
            <key>UIDeviceFamily</key>
            <array>
                <integer>1</integer>
                <integer>2</integer>
            </array>
        </dict>
        </plist>
        EOF
        
        zip -r Godot_iOS_Editor_Unsigned.ipa Payload/

    # 📤 ৭. ফাইনাল আনসাইনড .ipa ফাইলটি গিটহাবে আপলোড করা
    - name: Upload Final Unsigned IPA
      uses: actions/upload-artifact@v4
      with:
        name: Godot-iOS-Editor-Unsigned-IPA
        path: godot/Godot_iOS_Editor_Unsigned.ipa
