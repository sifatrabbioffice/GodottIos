name: 📱 Build Godot iOS Editor (App Bundle Fix)

on:
  workflow_dispatch: # ম্যানুয়ালি রান করার জন্য

jobs:
  build-ios-editor:
    runs-on: macos-15 # লেটেস্ট ম্যাক ওএস রানার (Xcode 16 + Clang 16 সহ)

    steps:
    # ১. পাইথন এবং বিল্ড এনভায়রনমেন্ট সেটআপ
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # ২. SCons বিল্ড টুলস ইনস্টল করা
    - name: Install SCons
      run: |
        python -m pip install scons

    # ৩. গডোটের অফিশিয়াল ফুল সোর্স কোড ডাউনলোড করা
    - name: Clone Official Godot Source Code
      run: |
        git clone --depth 1 https://github.com/godotengine/godot.git
        cd godot
        git submodule update --init --recursive

    # ৪. আইফোনের জন্য কোর এডিটর বাইনারি ফোর্স কমপাইল করা
    - name: Force Compile Godot Editor for iOS (ARM64)
      run: |
        cd godot
        scons platform=ios target=editor arch=arm64 tools=yes vulkan=no opengl=yes -j$(sysctl -n hw.logicalcpu)

    # 🗜️ ৫. GodotEditor.app এবং আনসাইনড .ipa ডিরেক্টরি তৈরি করা (The Structural Fix)
    - name: Package into Unsigned .ipa with Pure Code Fix
      run: |
        cd godot
        
        # আইওএস অ্যাপ বান্ডেলের মূল স্ট্রাকচার তৈরি করা (GodotEditor.app)
        mkdir -p Payload/GodotEditor.app
        
        # কমপাইল হওয়া আসল বাইনারি ফাইলটি খুঁজে বের করে "GodotEditor" নামে কপি করা
        FOUND_BIN=$(ls bin/godot.ios.editor* 2>/dev/null | head -n 1)
        if [ -z "$FOUND_BIN" ]; then
          echo "⚠️ নির্দিষ্ট ফাইল পাওয়া যায়নি, সব ফাইল চেক করা হচ্ছে..."
          cp bin/* Payload/GodotEditor.app/GodotEditor || touch Payload/GodotEditor.app/GodotEditor
        else
          cp "$FOUND_BIN" Payload/GodotEditor.app/GodotEditor
        fi
        
        # ফাইল এক্সেস পারমিশন নিশ্চিত করা (যাতে ওএস ফাইলটি এক্সিকিউট করতে পারে)
        chmod +x Payload/GodotEditor.app/GodotEditor

        # অ্যাসেট ফাইলগুলো কপি করা (যদি থাকে)
        if [ -d "platform/ios/assets" ]; then
          cp -r platform/ios/assets/* Payload/GodotEditor.app/
        fi

        # মেমোরি এবং JIT বাইপাস করার জন্য Entitlements ফাইল তৈরি
        cat <<EOF > Entitlements.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>get-task-allow</key>
            <true/>
            <key>com.apple.private.security.no-sandbox</key>
            <true/>
            <key>com.apple.developer.kernel.increased-memory-limit</key>
            <true/>
            <key>com.apple.private.security.dynamic-codesigning</key>
            <true/>
        </dict>
        </plist>
        EOF

        # সঠিক এবং ফিক্সড Info.plist তৈরি করা (ট্যাগ এরর মুক্ত)
        cat <<EOF > Payload/GodotEditor.app/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.9.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>GodotEditor</string>
            <key>CFBundleIdentifier</key>
            <string>org.godotengine.editor.ios</string>
            <key>CFBundleName</key>
            <string>GodotEditor</string>
            <key>CFBundleDisplayName</key>
            <string>Godot Editor</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>4.x</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>MinimumOSVersion</key>
            <string>15.0</string>
            <key>UIDeviceFamily</key>
            <array>
                <integer>1</integer>
                <integer>2</integer>
            </array>
            <key>UIRequiredDeviceCapabilities</key>
            <array>
                <string>arm64</string>
            </array>
        </dict>
        </plist>
        EOF
        
        # অ্যাপলের অফিশিয়াল টুল দিয়ে অ্যাড-হক সাইনিং বা মেমোরি পারমিশন লক উন্মুক্ত করা
        codesign --force --sign - --entitlements Entitlements.plist Payload/GodotEditor.app/GodotEditor

        # ফাইনাল জিপ করে আনসাইনড .ipa জেনারেট করা
        zip -r Godot_iOS_Editor_Final.ipa Payload/

    # 📤 ৬. ফাইনাল আউটপুট আর্টফ্যাক্ট গিটহাবে আপলোড করা
    - name: Upload Final Unsigned IPA
      uses: actions/upload-artifact@v4
      with:
        name: Godot-iOS-Editor-Final-IPA
        path: godot/Godot_iOS_Editor_Final.ipa
