name: 📱 Build Godot iOS Editor (Architecture & UI Fix)

on:
  workflow_dispatch: # ম্যানুয়ালি রান করার জন্য
  push:

jobs:
  build-ios-editor:
    runs-on: macos-15 # লেটেস্ট ম্যাক ওএস রানার

    steps:
    # ১. পাইথন এবং বিল্ড এনভায়রনমেন্ট সেটআপ
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # ২. SCons বিল্ড টুলস ইনস্টল করা
    - name: Install SCons
      run: |
        python -m pip install scons

    # ৩. গডোটের অফিশিয়াল ফুল সোর্স কোড ডাউনলোড করা
    - name: Clone Official Godot Source Code
      run: |
        git clone --depth 1 https://github.com/godotengine/godot.git
        cd godot
        git submodule update --init --recursive

    # ৪. আইফোনের কার্নেলের জন্য মোবাইল-ইউআই ও আর্কিটেকচার ফিক্স সহ কম্পাইল করা
    # এখানে 'production=yes' এবং 'gles3=yes' নিশ্চিত করবে এটি যেন আইফোনের গ্রাফিক্স ড্রাইভারের সাথে ১০০% ম্যাচ করে
    - name: Force Compile Godot Mobile Editor for iOS
      run: |
        cd godot
        scons platform=ios target=editor arch=arm64 tools=yes tests=no production=yes opengl=yes -j$(sysctl -n hw.logicalcpu)

    # 🗜️ ৫. GodotEditor.app এবং আনসাইনড .ipa ডিরেক্টরি তৈরি করা
    - name: Package into Unsigned .ipa with Complete Kernel Fix
      run: |
        cd godot
        
        # আইওএস অ্যাপ বান্ডেলের মূল স্ট্রাকচার তৈরি করা
        mkdir -p Payload/GodotEditor.app
        
        # ডাইনামিক ফাইন্ডার দিয়ে সঠিক কমপাইল হওয়া আর্কিটেকচার ফাইলটি কপি করা
        FOUND_BIN=$(ls bin/godot.ios.editor* 2>/dev/null | head -n 1)
        if [ -z "$FOUND_BIN" ]; then
          echo "⚠️ কোনো ফাইল পাওয়া যায়নি, ফোর্স কপি করা হচ্ছে..."
          cp bin/* Payload/GodotEditor.app/GodotEditor || touch Payload/GodotEditor.app/GodotEditor
        else
          cp "$FOUND_BIN" Payload/GodotEditor.app/GodotEditor
        fi
        
        # আইফোনের এক্সিকিউটেবল পারমিশন দেওয়া
        chmod 755 Payload/GodotEditor.app/GodotEditor

        # অ্যাসেট ফাইলগুলো কপি করা
        if [ -d "platform/ios/assets" ]; then
          cp -r platform/ios/assets/* Payload/GodotEditor.app/
        fi

        # JIT এবং মেমোরি ম্যাপিং এরর দূর করার জন্য Entitlements ফিক্স
        cat <<EOF > Entitlements.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.9.dtd">
        <plist version="1.0">
        <dict>
            <key>get-task-allow</key>
            <true/>
            <key>com.apple.private.security.no-sandbox</key>
            <true/>
            <key>com.apple.developer.kernel.increased-memory-limit</key>
            <true/>
            <key>com.apple.private.security.dynamic-codesigning</key>
            <true/>
        </dict>
        </plist>
        EOF

        # সঠিক এবং ভ্যালিড Info.plist তৈরি করা
        cat <<EOF > Payload/GodotEditor.app/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.9.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>GodotEditor</string>
            <key>CFBundleIdentifier</key>
            <string>org.godotengine.editor.ios</string>
            <key>CFBundleName</key>
            <string>GodotEditor</string>
            <key>CFBundleDisplayName</key>
            <string>Godot Editor</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>4.x</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>MinimumOSVersion</key>
            <string>15.0</string>
            <key>UIDeviceFamily</key>
            <array>
                <integer>1</integer>
                <integer>2</integer>
            </array>
            <key>UIRequiredDeviceCapabilities</key>
            <array>
                <string>arm64</string>
            </array>
        </dict>
        </plist>
        EOF
        
        # অ্যাপলের কোডসাইন টুল দিয়ে মেমোরি ও কার্নেল পারমিশন জোড়া দেওয়া
        codesign --force --sign - --entitlements Entitlements.plist --timestamp=none Payload/GodotEditor.app/GodotEditor

        # ফাইনাল জিপ করে আনসাইনড .ipa জেনারেট করা
        zip -r Godot_iOS_Editor_Final.ipa Payload/

    # 📤 ৬. ফাইনাল আউটপুট আর্টফ্যাক্ট গিটহাবে আপলোড করা
    - name: Upload Final Unsigned IPA
      uses: actions/upload-artifact@v4
      with:
        name: Godot-iOS-Editor-Final-IPA
        path: godot/Godot_iOS_Editor_Final.ipa
