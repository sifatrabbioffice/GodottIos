name: 📱 Build Godot iOS Editor (JIT & Memory Fix)

on:
  workflow_dispatch: # ম্যানুয়ালি রান করার জন্য

jobs:
  build-ios-editor:
    runs-on: macos-15 # লেটেস্ট এক্সকোড এবং কম্পাইলার এনভায়রনমেন্ট

    steps:
    # ১. পাইথন এবং বিল্ড টুলস সেটআপ
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # ২. SCons বিল্ড সিস্টেম ইনস্টল
    - name: Install SCons
      run: |
        python -m pip install scons

    # ৩. গডোটের অফিশিয়াল ফুল সোর্স কোড ক্লোন করা
    - name: Clone Official Godot Source Code
      run: |
        git clone --depth 1 https://github.com/godotengine/godot.git
        cd godot
        git submodule update --init --recursive

    # ৪. আইফোনের জন্য এডিটর এবং টুলস ফোর্স কমপাইল করা
    - name: Force Compile Godot Editor for iOS (ARM64)
      run: |
        cd godot
        scons platform=ios target=editor arch=arm64 tools=yes vulkan=no opengl=yes -j$(sysctl -n hw.logicalcpu)

    # 🗜️ ৫. আনসাইনড .ipa তৈরি ও মেমোরি পারমিশন ফিক্স (The Fix)
    - name: Package into Unsigned .ipa with Entitlements
      run: |
        cd godot
        mkdir -p Payload/GodotEditor.app
        
        # ডাইনামিক ফাইন্ডার দিয়ে বাইনারি কপি করা
        FOUND_BIN=$(ls bin/godot.ios.editor* 2>/dev/null | head -n 1)
        if [ -z "$FOUND_BIN" ]; then
          cp bin/* Payload/GodotEditor.app/GodotEditor || echo "No files"
        else
          cp "$FOUND_BIN" Payload/GodotEditor.app/GodotEditor
        fi
        
        # আইওএস অ্যাসেট কপি করা (যদি থাকে)
        if [ -d "platform/ios/assets" ]; then
          cp -r platform/ios/assets/* Payload/GodotEditor.app/
        fi

        # ১. কাস্টম Entitlements.plist তৈরি (এটি 'Bad file descriptor' এরর ফিক্স করবে)
        cat <<EOF > Entitlements.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>get-task-allow</key>
            <true/>
            <key>com.apple.private.security.no-sandbox</key>
            <true/>
            <key>com.apple.developer.kernel.increased-memory-limit</key>
            <true/>
            <key>com.apple.private.security.dynamic-codesigning</key>
            <true/>
        </dict>
        </plist>
        EOF

        # ২. আইফোনের জন্য মেইন Info.plist জেনারেট করা
        cat <<EOF > Payload/GodotEditor.app/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.9.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>GodotEditor</string>
            <key>CFBundleIdentifier</key>
            <string>org.godotengine.editor.ios</string>
            <key>CFBundleName</key>
            <string>GodotEditor</string>
            <key>CFBundleDisplayName</key>
            <string>Godot Editor</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>4.x</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>MinimumOSVersion</key>
            <string>15.0</string>
            <key>UIDeviceFamily</key>
            <array>
                <integer>1</integer>
                <integer>2</array>
            <key>UIRequiredDeviceCapabilities</key>
            <array>
                <string>arm64</string>
            </array>
        </dict>
        </plist>
        EOF

        # ৩. অ্যাপলের কোডসাইন টুল দিয়ে এনটাইটেলমেন্ট ইনজেক্ট করা (এডহক সাইনিং)
        # এটি সার্টিফিকেট ছাড়া ক্লাউডেই ফাইল পারমিশন লক উন্মুক্ত করে দেয়
        codesign --force --sign - --entitlements Entitlements.plist Payload/GodotEditor.app/GodotEditor

        # ৪. ফাইনাল জিপ করে .ipa জেনারেট করা
        zip -r Godot_iOS_Editor_Fixed.ipa Payload/

    # 📤 ৬. ফাইনাল ফিক্সড .ipa ফাইলটি গালারি আকারে আপলোড করা
    - name: Upload Fixed Unsigned IPA
      uses: actions/upload-artifact@v4
      with:
        name: Godot-iOS-Editor-Fixed-IPA
        path: godot/Godot_iOS_Editor_Fixed.ipa
