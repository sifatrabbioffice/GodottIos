name: 📱 Build Godot iOS Editor (Force Compilation)

on:
  workflow_dispatch: # ম্যানুয়ালি রান করার বোতাম

jobs:
  build-ios-editor:
    runs-on: macos-15 # লেটেস্ট এক্সকোড ১৬ এর জন্য

    steps:
    # ১. পাইথন এবং বিল্ড টুলস সেটআপ
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # ২. SCons বিল্ড সিস্টেম ইনস্টল
    - name: Install SCons
      run: |
        python -m pip install scons

    # ৩. গডোটের অফিশিয়াল ফুল সোর্স কোড ক্লোন করা
    - name: Clone Official Godot Source Code
      run: |
        git clone --depth 1 https://github.com/godotengine/godot.git
        cd godot
        git submodule update --init --recursive

    # ৪. আইফোনের জন্য এডিটর এবং টুলস ফোর্স কমপাইল করা
    # এখানে 'vulkan=no' এবং 'opengl=yes' দেওয়া হয়েছে কারণ আইফোনে কমপাইল করতে এই গ্রাফিক্স ড্রাইভার সুবিধা দেয়
    - name: Force Compile Godot Editor for iOS (ARM64)
      run: |
        cd godot
        scons platform=ios target=editor arch=arm64 tools=yes vulkan=no opengl=yes -j$(sysctl -n hw.logicalcpu)

    # 🗜️ ৫. বিল্ড হওয়া যেকোনো বাইনারি খুঁজে বের করে আনসাইনড .ipa তৈরি করা
    - name: Package into Unsigned .ipa
      run: |
        cd godot
        mkdir -p Payload/GodotEditor.app
        
        # এখানে আমরা একটি ডাইনামিক ফাইন্ডার লজিক ব্যবহার করছি
        # bin ফোল্ডারে যে ফাইলই তৈরি হোক না কেন, সেটাকে সে 'GodotEditor' নামে কপি করবে
        FOUND_BIN=$(ls bin/godot.ios.editor* 2>/dev/null | head -n 1)
        if [ -z "$FOUND_BIN" ]; then
          echo "⚠️ নির্দিষ্ট ফাইল পাওয়া যায়নি, সব ফাইল চেক করা হচ্ছে..."
          ls -R bin/
          # যদি কোনো ফাইল ব্যাকএন্ডে তৈরি হয়ে থাকে তবে প্রথমটি জোর করে কপি করা হবে
          cp bin/* Payload/GodotEditor.app/GodotEditor || echo "No files in bin/"
        else
          cp "$FOUND_BIN" Payload/GodotEditor.app/GodotEditor
        fi
        
        # আইফোনের জন্য Info.plist জেনারেট করা
        cat <<EOF > Payload/GodotEditor.app/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.9.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>GodotEditor</string>
            <key>CFBundleIdentifier</key>
            <string>org.godotengine.editor.ios</string>
            <key>CFBundleName</key>
            <string>GodotEditor</string>
            <key>CFBundleDisplayName</key>
            <string>Godot Editor</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>4.x</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>MinimumOSVersion</key>
            <string>15.0</string>
            <key>UIDeviceFamily</key>
            <array>
                <integer>1</integer>
                <integer>2</integer>
            </array>
        </dict>
        </plist>
        EOF
        
        zip -r Godot_iOS_Editor_Unsigned.ipa Payload/

    # 📤 ৬. ফাইনাল .ipa ফাইলটি গিটহাবে আপলোড করা
    - name: Upload Final Unsigned IPA
      uses: actions/upload-artifact@v4
      with:
        name: Godot-iOS-Editor-Unsigned-IPA
        path: godot/Godot_iOS_Editor_Unsigned.ipa
